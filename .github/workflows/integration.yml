name: Integration Tests (live NATS)

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/integration/**"
      - "docker-compose.test.yml"
      - ".github/workflows/integration.yml"
      - "package.json"
      - "bun.lock"
  push:
    branches: [main]

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats-js \
            -p 4223:4222 -p 8223:8222 \
            nats:2.10-alpine -js -m 8222 -DV
          # wget default connect timeout is 900s — without -T it can
          # hang the entire job when the container hasn't bound the
          # monitoring port yet (docker run -d returns before nats-server
          # is listening). Cap each attempt at 2s.
          for i in $(seq 1 30); do
            if wget -q -T 2 --tries=1 -O- http://localhost:8223/healthz; then
              echo "JS NATS up after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::NATS healthz never returned 200 after 30 attempts — dumping container logs"
              docker logs nats-js
              exit 1
            fi
            sleep 1
          done

      - name: Run unit tests (no NATS dep)
        run: bun test --bail src/

      - name: Run integration tests (live NATS, JetStream)
        env:
          NATS_URL: nats://localhost:4223
        run: bun test tests/integration

      - name: Stop sidecar NATS
        if: always()
        run: docker stop nats-js && docker rm nats-js
