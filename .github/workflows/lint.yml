name: Lint, Typecheck & Unit Tests

# Static analysis + unit test gate. Runs on every PR regardless of which
# files changed — unlike integration.yml's path filter, this catches
# eslint.config.js / tsconfig.json / package.json changes that would
# otherwise slip through without checks. Unit tests need no live NATS
# so they stay in this fast path; integration tests stay in integration.yml.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Architecture doc coverage
        run: bun scripts/check-architecture-coverage.ts

      - name: ESLint
        run: bun run lint

      - name: TypeScript
        run: bunx tsc --noEmit

      - name: TypeScript (identity submodule under noUncheckedIndexedAccess)
        run: bun run typecheck:identity-strict

      - name: TypeScript (tests + bench + scripts)
        run: bun run typecheck:full

      - name: Unit tests
        run: bun test src/
